<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV - Soraya Remaili</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <a href="index.html" class="site-logo" aria-label="Soraya Remaili — Home">
        <img src="logo2.png" alt="" class="site-logo-img" width="180" height="36">
    </a>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-pill pointer-events-auto relative flex rounded-lg border border-neutral-200 bg-white/70 p-1 shadow-md backdrop-blur-md">
                <div class="absolute left-0 -z-10 h-7 rounded bg-neutral-200 backdrop-blur transition-[width,transform,opacity]" style="transition-duration: 150ms; opacity: 0;"></div>
                <a class="rounded py-1 px-2 text-sm tracking-tight transition-colors focus-visible:ring-4 focus-visible:ring-blue-200 focus:text-neutral-900 hover:text-neutral-900 text-neutral-400" href="index.html">Home</a>
                <a class="rounded py-1 px-2 text-sm tracking-tight transition-colors focus-visible:ring-4 focus-visible:ring-blue-200 focus:text-neutral-900 hover:text-neutral-900 text-neutral-400" href="about.html">About Me</a>
                <a class="rounded py-1 px-2 text-sm tracking-tight transition-colors focus-visible:ring-4 focus-visible:ring-blue-200 focus:text-neutral-900 hover:text-neutral-900 text-neutral-400" href="research.html">Research</a>
                <a class="rounded py-1 px-2 text-sm tracking-tight transition-colors focus-visible:ring-4 focus-visible:ring-blue-200 focus:text-neutral-900 hover:text-neutral-900 text-neutral-400" href="contact.html">Contact</a>
                <a class="rounded py-1 px-2 text-sm tracking-tight transition-colors focus-visible:ring-4 focus-visible:ring-blue-200 focus:text-neutral-900 hover:text-neutral-900 text-neutral-900" href="cv.html" aria-current="page">CV</a>
            </div>
        </div>
    </nav>

    <main>
        <section class="cv-page cv-page--lead">
            <div class="container cv-page-container">
                <div id="cv-layout" class="cv-layout">
                    <div id="cv-layout-hint" class="cv-layout-hint"></div>
                    <div class="cv-layout-row">
                        <div class="cv-layout-main">
                            <div id="cv-interactive" class="cv-interactive"></div>
                        </div>
                        <aside id="cv-detail-panel" class="cv-detail-panel" hidden>
                            <button type="button" class="cv-detail-close" aria-label="Close details">&times;</button>
                            <div id="cv-detail-body" class="cv-detail-body"></div>
                        </aside>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-text">
                    <p>&copy; 2026 Soraya Remaili</p>
                </div>
                <div class="footer-links">
                    <a href="mailto:sremaili@email.sc.edu" class="social-link">
                        <i class="fas fa-envelope"></i>
                    </a>
                    <a href="https://github.com/sorayarem" class="social-link">
                        <i class="fab fa-github"></i>
                    </a>
                    <a href="https://scholar.google.com" class="social-link" target="_blank" rel="noopener noreferrer">
                        <i class="fas fa-graduation-cap"></i>
                    </a>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="cv-hotspots-data.js"></script>
    <script src="script.js"></script>
    <script src="cv-interactive.js" defer></script>
</body>
</html>
